<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>河﨑海斗HP 写真編集ツール</title>
<style>
  :root{
    --paper:#F7F4EC; --ink:#1C1E22; --ink-soft:#6b6b63;
    --hido:#9C3B22; --line:#DCD5C6; --card:#FFFDF7;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.8;
  }
  header{ padding:2rem clamp(1rem,4vw,3rem) 1rem; border-bottom:1px solid var(--line); }
  h1{ font-size:1.3rem; margin:0 0 .6rem; letter-spacing:.05em; }
  .lede{ max-width:46rem; font-size:.92rem; color:var(--ink-soft); }
  .lede b{ color:var(--hido); }
  main{ padding:1.5rem clamp(1rem,4vw,3rem) 4rem; display:grid; grid-template-columns:280px 1fr; gap:2rem; align-items:start; }
  @media (max-width:820px){ main{ grid-template-columns:1fr; } }

  /* スロット一覧 */
  .slots{ display:flex; flex-direction:column; gap:.6rem; }
  .slot-btn{
    display:flex; align-items:center; gap:.8rem; text-align:left;
    padding:.6rem; border:1px solid var(--line); border-radius:6px; background:var(--card);
    cursor:pointer; font:inherit; color:inherit;
  }
  .slot-btn.active{ border-color:var(--hido); box-shadow:0 0 0 1px var(--hido); }
  .slot-btn img{ width:44px; height:44px; object-fit:cover; border-radius:4px; background:var(--line); flex:none; }
  .slot-btn .meta{ min-width:0; display:flex; flex-direction:column; gap:.15rem; }
  .slot-btn .name{ font-size:.85rem; font-weight:600; display:block; }
  .slot-btn .file{ font-size:.68rem; color:var(--ink-soft); word-break:break-all; display:block; }

  /* エディタ */
  .editor{ background:var(--card); border:1px solid var(--line); border-radius:8px; padding:1.5rem; }
  .editor h2{ font-size:1.05rem; margin:0 0 .3rem; }
  .editor .file-path{ font-size:.75rem; color:var(--ink-soft); margin-bottom:1.2rem; }

  .drop-zone{
    border:2px dashed var(--line); border-radius:8px; padding:1rem; text-align:center;
    font-size:.82rem; color:var(--ink-soft); margin-bottom:1.2rem; cursor:pointer;
    transition:border-color .2s, background .2s;
  }
  .drop-zone.drag{ border-color:var(--hido); background:color-mix(in srgb, var(--hido) 6%, var(--card)); }
  .drop-zone input{ display:none; }

  .stage-wrap{ display:flex; gap:1.5rem; flex-wrap:wrap; align-items:flex-start; }
  .stage{
    position:relative; overflow:hidden; background:#00000010; border:1px solid var(--line);
    border-radius:4px; cursor:grab; touch-action:none; max-width:100%;
  }
  .stage:active{ cursor:grabbing; }
  .stage img{ position:absolute; max-width:none; user-select:none; -webkit-user-drag:none; pointer-events:none; }
  .stage .hint{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:.78rem; color:var(--ink-soft); background:rgba(247,244,236,.85); text-align:center; padding:1rem;
  }

  .controls{ min-width:220px; font-size:.85rem; }
  .controls .row{ display:flex; justify-content:space-between; margin-bottom:.5rem; }
  .controls .row b{ font-variant-numeric:tabular-nums; }
  .controls input[type=range]{ width:100%; }
  .controls .group{ margin-bottom:1.1rem; }
  .controls .group-label{ font-size:.72rem; letter-spacing:.1em; color:var(--hido); margin-bottom:.3rem; }

  .btn{
    display:inline-block; font:inherit; font-size:.82rem; letter-spacing:.05em;
    padding:.6em 1.4em; border-radius:999px; border:1px solid var(--ink); background:transparent;
    color:var(--ink); cursor:pointer; text-decoration:none;
  }
  .btn:hover{ background:var(--ink); color:var(--paper); }
  .btn.primary{ background:var(--hido); border-color:var(--hido); color:#fff; }
  .btn.primary:hover{ background:#7e2e1a; border-color:#7e2e1a; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn:disabled:hover{ background:transparent; color:var(--ink); }

  .export-panel{ margin-top:1.4rem; padding-top:1.2rem; border-top:1px solid var(--line); }
  .export-steps{ font-size:.85rem; counter-reset:step; list-style:none; margin:1rem 0 0; padding:0; }
  .export-steps li{ position:relative; padding-left:2rem; margin-bottom:1rem; }
  .export-steps li::before{
    counter-increment:step; content:counter(step);
    position:absolute; left:0; top:0; width:1.5rem; height:1.5rem; border-radius:50%;
    background:var(--hido); color:#fff; font-size:.75rem; display:flex; align-items:center; justify-content:center;
  }
  code.copyval{
    display:inline-flex; align-items:center; gap:.5em; background:var(--paper); border:1px solid var(--line);
    border-radius:4px; padding:.3em .7em; font-size:.85rem; font-family:ui-monospace,monospace;
  }
  .copy-btn{
    font-size:.7rem; border:1px solid var(--line); background:var(--card); border-radius:4px;
    padding:.15em .6em; cursor:pointer;
  }
  .copy-btn.copied{ border-color:var(--hido); color:var(--hido); }
  .empty-state{ color:var(--ink-soft); font-size:.9rem; padding:3rem 1rem; text-align:center; }
</style>
</head>
<body>

<header>
  <h1>河﨑海斗HP 写真編集ツール</h1>
  <p class="lede">
    このページはブラウザだけで動くローカルツールです(サーバー通信なし)。左のスロットから編集したい写真を選び、
    新しい写真をドラッグ&ドロップで入れ替えたり、プレビュー上で写真をドラッグして位置を調整できます。
    調整が終わったら「書き出す」を押すと、<b>サイトにそのまま使える画像ファイル</b>と、位置を変えた場合の
    <b>貼り替え用の短い文字列</b>が出てきます。指示どおりファイルを置き換えれば反映されます。
  </p>
</header>

<main>
  <div class="slots" id="slotList"></div>
  <div id="editorArea"><div class="empty-state">← 左のリストから編集したい写真を選んでください</div></div>
</main>

<script>
(function(){
  "use strict";

  // サイト内の画像スロット定義（label, 現在のファイルパス, 目標アスペクト比, 現在のobject-position）
  var SLOTS = [
    { id:"artist", label:"経歴の写真", file:"img/artist_self_portrait.jpg", ratio:3/4, pos:{x:22,y:40},
      where:"index.html の .artist-photo img" },
    { id:"dm", label:"展示情報のDM画像", file:"img/exhibition_dm_takashimaya.jpg", ratio:3/4, pos:{x:50,y:50},
      where:"index.html の .exhi-feature-dm img" },
    { id:"work-nishikigoi", label:"代表作品：錦鯉", file:"img/work_nishikigoi.jpg", ratio:3/4, pos:{x:50,y:50},
      where:"index.html の 代表作品セクション（錦鯉のzukan-card）" },
    { id:"work-shuiro", label:"代表作品：朱色和金", file:"img/work_shuiro-wakin.jpg", ratio:3/4, pos:{x:50,y:50},
      where:"index.html の 代表作品セクション（朱色和金のzukan-card）" },
    { id:"work-frog", label:"代表作品：カエル", file:"img/g_frog_hand.jpg", ratio:3/4, pos:{x:50,y:50},
      where:"index.html の 代表作品セクション（カエルのzukan-card）" },
    { id:"hero1", label:"ヒーロー背景 1（白背景の金魚）", file:"img/hero_wide_kingyo_white.jpg", ratio:21/9, pos:{x:50,y:50},
      where:"index.html の .hero-bg 内 1枚目の img" },
    { id:"hero2", label:"ヒーロー背景 2（蛙と葉）", file:"img/hero_wide_frog_leaves.jpg", ratio:21/9, pos:{x:50,y:50},
      where:"index.html の .hero-bg 内 2枚目の img" },
    { id:"hero3", label:"ヒーロー背景 3（展示風景）", file:"img/hero_wide_kingyo_gallery.jpg", ratio:21/9, pos:{x:50,y:50},
      where:"index.html の .hero-bg 内 3枚目の img" },
    { id:"hero4", label:"ヒーロー背景 4（木目テーブル）", file:"img/hero_wide_kingyo_wood.jpg", ratio:21/9, pos:{x:50,y:50},
      where:"index.html の .hero-bg 内 4枚目の img" }
  ];

  var repoImgBase = "../img/"; // このツールは tools/ フォルダから見て一つ上の img/ を参照
  var current = null;      // 現在選択中のスロット(SLOTS要素のコピー)
  var loadedImg = null;    // 現在プレビューしている <img> 要素（元画像）
  var loadedIsNew = false; // ユーザーが新規ドロップした画像か

  var slotListEl = document.getElementById("slotList");
  var editorAreaEl = document.getElementById("editorArea");

  function renderSlotList(){
    slotListEl.innerHTML = "";
    SLOTS.forEach(function(slot){
      var btn = document.createElement("button");
      btn.className = "slot-btn" + (current && current.id === slot.id ? " active" : "");
      btn.type = "button";
      btn.innerHTML =
        '<img src="' + repoImgBase + slot.file.replace("img/","") + '" alt="">' +
        '<span class="meta"><span class="name">' + slot.label + '</span>' +
        '<span class="file">' + slot.file + '</span></span>';
      btn.addEventListener("click", function(){ selectSlot(slot.id); });
      slotListEl.appendChild(btn);
    });
  }

  function selectSlot(id){
    var base = SLOTS.filter(function(s){ return s.id === id; })[0];
    current = JSON.parse(JSON.stringify(base));
    current.origPosX = current.pos.x; current.origPosY = current.pos.y;
    loadedImg = null;
    loadedIsNew = false;
    renderSlotList();
    renderEditor();
    loadImageForCurrentSlot(repoImgBase + current.file.replace("img/",""), false);
  }

  function loadImageForCurrentSlot(src, isNew){
    var im = new Image();
    im.onload = function(){
      loadedImg = im;
      loadedIsNew = isNew;
      mountStageImage();
    };
    im.onerror = function(){
      // ローカルファイルが見つからない場合など
      loadedImg = null;
      renderStagePlaceholder("この画像を読み込めませんでした。新しい写真をドラッグ&ドロップしてください。");
    };
    im.src = src;
  }

  function renderEditor(){
    if (!current){
      editorAreaEl.innerHTML = '<div class="empty-state">← 左のリストから編集したい写真を選んでください</div>';
      return;
    }
    editorAreaEl.innerHTML =
      '<div class="editor">' +
        '<h2>' + current.label + '</h2>' +
        '<div class="file-path">保存先: ' + current.file + ' ／ 配置: ' + current.where + '</div>' +
        '<div class="drop-zone" id="dropZone">新しい写真をここにドラッグ&ドロップ、またはクリックして選択<br>' +
          '（入れ替えない場合はこのままでOK。位置調整だけもできます）' +
          '<input type="file" id="fileInput" accept="image/*">' +
        '</div>' +
        '<div class="stage-wrap">' +
          '<div class="stage" id="stage"><div class="hint">読み込み中…</div></div>' +
          '<div class="controls">' +
            '<div class="group">' +
              '<div class="group-label">位置調整（プレビューをドラッグしても動かせます）</div>' +
              '<div class="row"><span>横位置</span><b id="valX">' + current.pos.x + '%</b></div>' +
              '<input type="range" id="rangeX" min="0" max="100" value="' + current.pos.x + '">' +
              '<div class="row"><span>縦位置</span><b id="valY">' + current.pos.y + '%</b></div>' +
              '<input type="range" id="rangeY" min="0" max="100" value="' + current.pos.y + '">' +
            '</div>' +
            '<button class="btn" id="resetBtn" type="button">中央に戻す</button>' +
          '</div>' +
        '</div>' +
        '<div class="export-panel">' +
          '<button class="btn primary" id="exportBtn" type="button">この内容で書き出す</button>' +
          '<div id="exportResult"></div>' +
        '</div>' +
      '</div>';

    document.getElementById("rangeX").addEventListener("input", function(e){
      current.pos.x = Number(e.target.value);
      document.getElementById("valX").textContent = current.pos.x + "%";
      updateStageTransform();
    });
    document.getElementById("rangeY").addEventListener("input", function(e){
      current.pos.y = Number(e.target.value);
      document.getElementById("valY").textContent = current.pos.y + "%";
      updateStageTransform();
    });
    document.getElementById("resetBtn").addEventListener("click", function(){
      current.pos.x = 50; current.pos.y = 50;
      document.getElementById("rangeX").value = 50;
      document.getElementById("rangeY").value = 50;
      document.getElementById("valX").textContent = "50%";
      document.getElementById("valY").textContent = "50%";
      updateStageTransform();
    });
    document.getElementById("exportBtn").addEventListener("click", doExport);

    setupDropZone();
    if (loadedImg) mountStageImage();
  }

  function renderStagePlaceholder(msg){
    var stage = document.getElementById("stage");
    if (stage) stage.innerHTML = '<div class="hint">' + msg + '</div>';
  }

  /* ---------- ドラッグ&ドロップでの画像読み込み ---------- */
  function setupDropZone(){
    var zone = document.getElementById("dropZone");
    var input = document.getElementById("fileInput");
    zone.addEventListener("click", function(){ input.click(); });
    input.addEventListener("change", function(){
      if (input.files && input.files[0]) handleFile(input.files[0]);
    });
    ["dragenter","dragover"].forEach(function(evt){
      zone.addEventListener(evt, function(e){ e.preventDefault(); zone.classList.add("drag"); });
    });
    ["dragleave","drop"].forEach(function(evt){
      zone.addEventListener(evt, function(e){ e.preventDefault(); zone.classList.remove("drag"); });
    });
    zone.addEventListener("drop", function(e){
      e.preventDefault();
      var f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) handleFile(f);
    });
  }
  function handleFile(file){
    if (!/^image\//.test(file.type)){ alert("画像ファイルを選んでください"); return; }
    var reader = new FileReader();
    reader.onload = function(e){
      current.pos.x = 50; current.pos.y = 50; // 新しい写真は中央から調整し直す
      current.origPosX = 50; current.origPosY = 50;
      var rx = document.getElementById("rangeX"), ry = document.getElementById("rangeY");
      var vx = document.getElementById("valX"), vy = document.getElementById("valY");
      if (rx){ rx.value = 50; ry.value = 50; vx.textContent = "50%"; vy.textContent = "50%"; }
      loadImageForCurrentSlot(e.target.result, true);
    };
    reader.readAsDataURL(file);
  }

  /* ---------- プレビュー（ステージ）表示とドラッグ操作 ---------- */
  var stageState = { w:0, h:0, imgW:0, imgH:0, scale:1, dragging:false, startX:0, startY:0, startPosX:0, startPosY:0 };

  function mountStageImage(){
    var stage = document.getElementById("stage");
    if (!stage || !loadedImg) return;

    var maxW = Math.min(460, window.innerWidth - 360);
    if (maxW < 220) maxW = 220;
    var w = maxW, h = w / current.ratio;
    stage.style.width = w + "px";
    stage.style.height = h + "px";
    stageState.w = w; stageState.h = h;

    // object-fit:cover 相当のスケールを計算
    var iw = loadedImg.naturalWidth, ih = loadedImg.naturalHeight;
    var scale = Math.max(w / iw, h / ih);
    stageState.scale = scale; stageState.imgW = iw * scale; stageState.imgH = ih * scale;

    stage.innerHTML = "";
    var imgEl = document.createElement("img");
    imgEl.src = loadedImg.src;
    imgEl.width = stageState.imgW; imgEl.height = stageState.imgH;
    stage.appendChild(imgEl);
    stage.dataset.ready = "1";
    updateStageTransform();
    bindStageDrag(stage);
  }

  function updateStageTransform(){
    var stage = document.getElementById("stage");
    if (!stage || stage.dataset.ready !== "1") return;
    var imgEl = stage.querySelector("img");
    var freeX = stageState.imgW - stageState.w;
    var freeY = stageState.imgH - stageState.h;
    var left = -(freeX * current.pos.x / 100);
    var top = -(freeY * current.pos.y / 100);
    imgEl.style.left = left + "px";
    imgEl.style.top = top + "px";
  }

  function bindStageDrag(stage){
    function posFromEvent(e){
      return e.touches ? { x:e.touches[0].clientX, y:e.touches[0].clientY } : { x:e.clientX, y:e.clientY };
    }
    function start(e){
      stageState.dragging = true;
      var p = posFromEvent(e);
      stageState.startX = p.x; stageState.startY = p.y;
      stageState.startPosX = current.pos.x; stageState.startPosY = current.pos.y;
    }
    function move(e){
      if (!stageState.dragging) return;
      e.preventDefault();
      var p = posFromEvent(e);
      var dx = p.x - stageState.startX, dy = p.y - stageState.startY;
      var freeX = stageState.imgW - stageState.w;
      var freeY = stageState.imgH - stageState.h;
      var dPctX = freeX > 0 ? (-dx / freeX) * 100 : 0;
      var dPctY = freeY > 0 ? (-dy / freeY) * 100 : 0;
      current.pos.x = clamp(stageState.startPosX + dPctX, 0, 100);
      current.pos.y = clamp(stageState.startPosY + dPctY, 0, 100);
      document.getElementById("rangeX").value = Math.round(current.pos.x);
      document.getElementById("rangeY").value = Math.round(current.pos.y);
      document.getElementById("valX").textContent = Math.round(current.pos.x) + "%";
      document.getElementById("valY").textContent = Math.round(current.pos.y) + "%";
      updateStageTransform();
    }
    function end(){ stageState.dragging = false; }
    stage.addEventListener("mousedown", start);
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", end);
    stage.addEventListener("touchstart", start, { passive:true });
    window.addEventListener("touchmove", move, { passive:false });
    window.addEventListener("touchend", end);
  }
  function clamp(v, lo, hi){ return v < lo ? lo : v > hi ? hi : v; }

  /* ---------- 書き出し ---------- */
  function doExport(){
    if (!loadedImg){ alert("写真が読み込まれていません"); return; }
    var posStr = Math.round(current.pos.x) + "% " + Math.round(current.pos.y) + "%";
    var posUnchanged = Math.round(current.pos.x) === Math.round(current.origPosX) &&
                        Math.round(current.pos.y) === Math.round(current.origPosY);

    if (!loadedIsNew){
      // 写真は差し替えていない＝ファイル自体は変わらないので、位置の数値だけ案内する
      // （元のファイルをそのままcanvasに書き出そうとするとブラウザの安全制限に
      //   引っかかるため、この場合は画像の書き出し自体を行わない）
      renderExportResult(
        posUnchanged
          ? '<li>写真・位置とも変更されていません。書き出す内容はありません。</li>'
          : '<li>写真の位置を変更しました。<code>' + current.where + '</code> 付近にある<br>' +
            '<code class="copyval"><span>object-position の値を</span> <b>' + posStr + '</b> ' +
            '<button class="copy-btn" data-copy="' + posStr + '">コピー</button></code>' +
            ' に書き換えてください。画像ファイル自体は差し替え不要です。</li>'
      );
      return;
    }

    // 新しい写真をアップロードした場合は、サイトの枠に合わせて書き出す
    var longEdge = current.ratio >= 1.6 ? 2200 : 1400; // 横長(ヒーロー)は長辺を大きめに
    var iw = loadedImg.naturalWidth, ih = loadedImg.naturalHeight;
    var outW, outH;
    if (iw >= ih){ outW = Math.min(longEdge, iw); outH = outW * ih / iw; }
    else { outH = Math.min(longEdge, ih); outW = outH * iw / ih; }

    var canvas = document.createElement("canvas");
    canvas.width = Math.round(outW); canvas.height = Math.round(outH);
    var ctx = canvas.getContext("2d");
    ctx.drawImage(loadedImg, 0, 0, canvas.width, canvas.height);

    var filename = current.file.split("/").pop();
    canvas.toBlob(function(blob){
      var url = URL.createObjectURL(blob);
      var sizeKB = Math.round(blob.size / 1024);
      var html =
        '<li><a class="btn primary" href="' + url + '" download="' + filename + '">画像をダウンロード（' + sizeKB + 'KB）</a>' +
          '<div style="margin-top:.5rem;font-size:.8rem;color:var(--ink-soft);">ダウンロードした「' + filename + '」を、Finderで <code>kawasaki-kaito-hp/' + current.file + '</code> の場所に上書き保存してください。</div></li>' +
        (posUnchanged
          ? '<li>位置は中央のままなので、そのままで反映されます（貼り替え不要）。</li>'
          : '<li>写真の位置をずらした場合は、<code>' + current.where + '</code> 付近にある<br>' +
            '<code class="copyval"><span>object-position の値を</span> <b>' + posStr + '</b> ' +
            '<button class="copy-btn" data-copy="' + posStr + '">コピー</button></code>' +
            ' に書き換えてください。</li>');
      renderExportResult(html);
    }, "image/jpeg", 0.85);
  }

  function renderExportResult(itemsHtml){
    var resultEl = document.getElementById("exportResult");
    resultEl.innerHTML = '<ul class="export-steps">' + itemsHtml +
      '<li style="list-style:none;padding-left:0;font-size:.78rem;color:var(--ink-soft);">' +
      '分からない場合はこの画面ごとキャプチャして送ってもらえれば代わりに直します。</li></ul>';
    resultEl.querySelectorAll(".copy-btn").forEach(function(btn){
      btn.addEventListener("click", function(){
        navigator.clipboard.writeText(btn.dataset.copy).then(function(){
          btn.textContent = "コピーしました";
          btn.classList.add("copied");
          setTimeout(function(){ btn.textContent = "コピー"; btn.classList.remove("copied"); }, 1500);
        });
      });
    });
  }

  window.addEventListener("resize", function(){ if (loadedImg) mountStageImage(); });

  renderSlotList();
})();
</script>
</body>
</html>
