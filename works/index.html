/* ============ tokens（本体 index.html と同一） ============ */
:root{
  --paper:#F7F4EC;
  --ink:#1C1E22;
  --ink-soft:#4C4D48;
  --hido:#9C3B22;
  --hido-deep:#7E2E1A;
  --brass:#9A7B3F;
  --line:#DCD5C6;
  --card:#FFFDF7;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#14171C; --ink:#E9E4D9; --ink-soft:#ABABA1;
    --hido:#CE6A4A; --hido-deep:#E08767; --brass:#C2A05C;
    --line:#2B3037; --card:#1B1F25;
  }
}
:root[data-theme="light"]{
  --paper:#F7F4EC; --ink:#1C1E22; --ink-soft:#4C4D48;
  --hido:#9C3B22; --hido-deep:#7E2E1A; --brass:#9A7B3F;
  --line:#DCD5C6; --card:#FFFDF7;
}
:root[data-theme="dark"]{
  --paper:#14171C; --ink:#E9E4D9; --ink-soft:#ABABA1;
  --hido:#CE6A4A; --hido-deep:#E08767; --brass:#C2A05C;
  --line:#2B3037; --card:#1B1F25;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; background:var(--paper); }
body{
  background:var(--paper);
  color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
  font-feature-settings:"palt";
  line-height:1.9;
  letter-spacing:0.04em;
  -webkit-font-smoothing:antialiased;
}
a{ color:inherit; }
:focus-visible{ outline:2px solid var(--hido); outline-offset:3px; }
.mincho{ font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif; }

/* ============ nav（本体と共通） ============ */
header{
  position:fixed; top:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  padding:1rem clamp(1.2rem, 4vw, 3rem);
  background:color-mix(in srgb, var(--paper) 84%, transparent);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid color-mix(in srgb, var(--line) 60%, transparent);
}
.brand{
  font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:1.05rem; letter-spacing:.3em; text-decoration:none; font-weight:600;
}
nav ul{ display:flex; gap:clamp(1rem,2.6vw,2.2rem); list-style:none; }
nav a{
  text-decoration:none; font-size:.8rem; letter-spacing:.16em;
  color:var(--ink-soft); transition:color .25s;
}
nav a:hover, nav a[aria-current]{ color:var(--hido); }
@media (max-width:720px){
  header{ flex-direction:column; gap:.3rem; padding:.7rem 1rem; }
  nav ul{ gap:1.1rem; }
  nav a{ font-size:.72rem; letter-spacing:.1em; }
  nav .sub{ display:none; }
}

main{ position:relative; z-index:1; padding-top:5.5rem; }
section{ padding:clamp(2rem,5vw,3.6rem) clamp(1.4rem,6vw,5rem); }

.sec-head{ display:flex; align-items:baseline; gap:1.4rem; margin-bottom:2.2rem; }
.sec-head h2{
  font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:clamp(1.5rem,3.2vw,2.1rem); font-weight:600; letter-spacing:.2em;
}
.sec-head span{ font-size:.72rem; letter-spacing:.34em; color:var(--hido); }
.sec-head::after{ content:""; flex:1; height:1px; background:var(--line); }

.archive-lede{
  max-width:40rem; margin-bottom:1.4rem;
  font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:1.02rem; line-height:2.3;
}
.archive-back{ font-size:.8rem; }
.archive-back a{
  color:var(--hido); text-decoration:none;
  border-bottom:1px solid color-mix(in srgb, var(--hido) 45%, transparent);
  padding-bottom:.1em; transition:border-color .25s;
}
.archive-back a:hover{ border-color:var(--hido); }

/* ============ 年別グリッド ============ */
.archive-year{ margin-bottom:clamp(2.6rem,6vw,4rem); }
.year-head{ display:flex; align-items:baseline; gap:1.1rem; margin-bottom:1.5rem; }
.year-head .year-num{
  font-family:"Didot","Bodoni 72",Georgia,"Times New Roman",serif;
  font-size:clamp(1.5rem,3vw,2rem); color:var(--hido); letter-spacing:.05em;
}
.year-head .year-line{ flex:1; height:1px; background:var(--line); }

.archive-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:1.1rem;
}
.archive-tile{
  appearance:none; border:1px solid var(--line); background:var(--card);
  border-radius:2px; padding:0; cursor:pointer; text-align:left; font:inherit; color:inherit;
  display:flex; flex-direction:column; overflow:hidden;
  transition:border-color .25s ease, transform .25s ease;
}
.archive-tile:hover, .archive-tile:focus-visible{ border-color:var(--hido); transform:translateY(-3px); }
.tile-visual{
  aspect-ratio:1/1; position:relative;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(90% 130% at 50% 120%, color-mix(in srgb, var(--hido) 22%, transparent) 0%, transparent 60%),
    linear-gradient(165deg, color-mix(in srgb, var(--ink) 6%, var(--card)), var(--card));
  border-bottom:1px solid var(--line);
}
.tile-visual .kanji{
  font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:2.5rem; font-weight:600; color:color-mix(in srgb, var(--hido) 78%, var(--ink));
}
.tile-visual img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.tile-meta{ padding:.65rem .75rem .8rem; }
.tile-title{
  display:block; font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:.88rem; font-weight:600; letter-spacing:.05em;
}
.tile-note{ display:block; font-size:.65rem; color:var(--ink-soft); letter-spacing:.08em; margin-top:.2rem; }

/* ============ モーダル ============ */
.work-modal{
  position:fixed; inset:0; z-index:60;
  display:flex; align-items:center; justify-content:center; padding:1.4rem;
  opacity:0; visibility:hidden; transition:opacity .25s ease;
}
.work-modal.open{ opacity:1; visibility:visible; }
.work-modal-backdrop{
  position:absolute; inset:0;
  background:color-mix(in srgb, var(--ink) 55%, transparent);
  backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
}
.work-modal-panel{
  position:relative; z-index:1; width:100%; max-width:640px; max-height:88vh; overflow:auto;
  background:var(--card); border:1px solid var(--line); border-radius:3px;
  box-shadow:0 30px 60px rgba(0,0,0,.35);
  transform:translateY(12px); transition:transform .25s ease;
}
.work-modal.open .work-modal-panel{ transform:none; }
@media (min-width:640px){
  .work-modal-panel{ max-width:820px; display:grid; grid-template-columns:1fr 1fr; }
}
.work-modal-close{
  position:absolute; top:.6rem; right:.6rem; z-index:2;
  width:2.2rem; height:2.2rem; border-radius:50%;
  border:1px solid var(--line); background:var(--paper); color:var(--ink);
  font-size:1.05rem; line-height:1; cursor:pointer;
}
.work-modal-close:hover{ border-color:var(--hido); color:var(--hido); }
.work-modal-visual{
  aspect-ratio:1/1; position:relative;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(90% 130% at 50% 120%, color-mix(in srgb, var(--hido) 22%, transparent) 0%, transparent 60%),
    linear-gradient(165deg, color-mix(in srgb, var(--ink) 6%, var(--card)), var(--card));
}
.work-modal-visual .kanji{
  font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:5rem; font-weight:600; color:color-mix(in srgb, var(--hido) 78%, var(--ink));
}
.work-modal-visual img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.work-modal-body{ padding:1.6rem 1.6rem 1.8rem; display:flex; flex-direction:column; gap:.8rem; }
.work-modal-body h3{
  font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:1.2rem; font-weight:600; letter-spacing:.06em;
}
.work-modal-body h3 small{ font-weight:400; font-size:.72rem; color:var(--ink-soft); margin-left:.6em; letter-spacing:.1em; }
.modal-sub{ font-size:.72rem; color:var(--ink-soft); letter-spacing:.1em; margin-top:-.4rem; }
.work-award{
  font-size:.7rem; letter-spacing:.12em; color:var(--hido);
  border:1px solid color-mix(in srgb, var(--hido) 45%, transparent);
  border-radius:999px; padding:.15em .9em; align-self:flex-start;
}
.work-modal-body p{ font-size:.87rem; line-height:1.9; }
.work-specs{ margin-top:auto; font-size:.75rem; color:var(--ink-soft); border-top:1px solid var(--line); padding-top:.7rem; }
.work-specs div{ display:flex; gap:.8em; }
.work-specs dt{ min-width:3.5em; letter-spacing:.1em; }

footer{
  padding:2.5rem; text-align:center;
  font-size:.7rem; letter-spacing:.3em; color:var(--ink-soft);
  border-top:1px solid var(--line);
}

  function tileVisualHTML(w){
    if (w.img) return '<img src="' + w.img + '" alt="' + (w.alt || w.title) + '" loading="lazy">';
    return '<span class="kanji">' + w.kanji + '</span>';
  }

  var archive = document.getElementById("archive");
  var byYear = {};
  var years = [];
  WORKS.forEach(function(w){
    if (!byYear[w.year]){ byYear[w.year] = []; years.push(w.year); }
    byYear[w.year].push(w);
  });
  years.sort(function(a, b){ return b - a; });

  var html = "";
  years.forEach(function(y){
    html += '<div class="archive-year"><div class="year-head"><span class="year-num">' + y + '</span><span class="year-line"></span></div><div class="archive-grid">';
    byYear[y].forEach(function(w){
      html += '<button class="archive-tile" type="button" data-id="' + w.id + '">' +
        '<span class="tile-visual">' + tileVisualHTML(w) + '</span>' +
        '<span class="tile-meta"><span class="tile-title">' + w.title + '</span>' +
        (w.yearLabel ? '<span class="tile-note">' + w.yearLabel + '</span>' : '') +
        '</span></button>';
    });
    html += "</div></div>";
  });
  archive.innerHTML = html;

  var modal = document.getElementById("workModal");
  var modalVisual = document.getElementById("modalVisual");
  var modalTitle = document.getElementById("modalTitle");
  var modalSub = document.getElementById("modalSub");
  var modalAward = document.getElementById("modalAward");
  var modalDesc = document.getElementById("modalDesc");
  var modalSpecs = document.getElementById("modalSpecs");
  var lastFocused = null;

  function openModal(w){
    modalVisual.innerHTML = tileVisualHTML(w);
    modalTitle.textContent = w.title;
    modalTitle.innerHTML += w.yearLabel ? " <small>" + w.yearLabel + "</small>" : " <small>" + w.year + "</small>";
    var sub = w.en || w.motif || "";
    if (sub){ modalSub.textContent = sub; modalSub.hidden = false; }
    else { modalSub.hidden = true; }
    if (w.award){ modalAward.textContent = w.award; modalAward.hidden = false; }
    else { modalAward.hidden = true; }
    if (w.desc){ modalDesc.textContent = w.desc; modalDesc.hidden = false; }
    else { modalDesc.hidden = true; }
    modalSpecs.innerHTML = w.specs.map(function(s){
      return "<div><dt>" + s[0] + "</dt><dd>" + s[1] + "</dd></div>";
    }).join("");
    lastFocused = document.activeElement;
    modal.hidden = false;
    requestAnimationFrame(function(){ modal.classList.add("open"); });
    modal.querySelector(".work-modal-close").focus();
    document.body.style.overflow = "hidden";
  }

  function closeModal(){
    modal.classList.remove("open");
    document.body.style.overflow = "";
    window.setTimeout(function(){ modal.hidden = true; }, 250);
    if (lastFocused) lastFocused.focus();
  }

  archive.addEventListener("click", function(e){
    var tile = e.target.closest(".archive-tile");
    if (!tile) return;
    var w = WORKS.filter(function(x){ return x.id === tile.dataset.id; })[0];
    if (w) openModal(w);
  });

  modal.addEventListener("click", function(e){
    if (e.target.closest("[data-close]")) closeModal();
  });

  document.addEventListener("keydown", function(e){
    if (e.key === "Escape" && !modal.hidden) closeModal();
  });

  var yEl = document.getElementById("cpyear");
  if (yEl){
    var y = new Date().getFullYear();
    if (y > 2026) yEl.textContent = "2026–" + y;
  }

  /* トップページの代表作品カードなどから #id で直接開けるようにする */
  if (location.hash){
    var deepLinked = WORKS.filter(function(w){ return "#" + w.id === location.hash; })[0];
    if (deepLinked) openModal(deepLinked);
  }
})();
